name: task3_languagelearningapp
description: "An interactive language learning app with flashcards, quizzes, and daily lessons."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
    
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  provider: ^6.1.1
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  audioplayers: ^6.0.0
  flutter_tts: ^4.0.2
  firebase_core: ^2.31.0
  firebase_auth: ^4.19.5
  cloud_firestore: ^4.17.3
  firebase_storage: ^11.7.5
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  intl: ^0.19.0
  uuid: ^4.4.0
  url_launcher: ^6.3.0
  cached_network_image: ^3.3.1
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  fl_chart: ^0.67.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
